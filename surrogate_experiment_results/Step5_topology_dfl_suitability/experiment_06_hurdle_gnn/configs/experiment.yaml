stage_one:
  task: zero_vs_nonzero
  objective: class_balanced_bce
  positive_class: nonzero
  positive_weight: training_fold_zero_count_divided_by_nonzero_count
  checkpoint_metric: validation_weighted_bce
  threshold: 0.5
  metrics: [accuracy, balanced_accuracy, precision, recall, specificity, f1, auroc, average_precision]

stage_two:
  training_subsets:
    nonzero: label_not_equal_zero
    material: abs_label_gt_0.1pp
  objectives: [huber, weighted_huber, mse, signed_log_mse, huber_rank]
  weighted_huber_formula: (1 + min(abs(y)/train_q90_abs,1))/train_mean_weight
  signed_log_formula: sign(y)*log1p(abs(y))
  ranking_formula: huber + 0.25*pairwise_logistic_ranking
  checkpoint_metric: validation_subset_mae_pp
  prediction_modes: [raw_regressor, hard_hurdle, soft_hurdle, oracle_nonzero_gate]

