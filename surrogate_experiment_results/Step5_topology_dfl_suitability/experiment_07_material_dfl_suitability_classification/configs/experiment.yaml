labels:
  primary_task:
    positive: primary_label == material_helpful
    negative: primary_label != material_helpful
    harmful_role: safety_evaluation_not_primary_training_class
  secondary_task: three_class_material_harmful_neutral_helpful
  primary:
    material_helpful: formal_label_mean_pp > 0.5
    material_harmful: formal_label_mean_pp < -0.5
    neutral_or_uncertain: otherwise
  confidence_aware:
    sign_agreement: at least two of three seed deltas match the primary material direction
    bootstrap_ci:
      method: exact ordered n=3 nonparametric percentile bootstrap
      resamples: 27
      alpha: 0.05
      requirement: interval excludes zero in the primary material direction
    high_variance:
      definition: label_uncertainty_std_pp > 0.5
      action: map confidence label to neutral_or_uncertain and retain uncertainty reason
    strict_confidence_label: primary material label AND sign agreement AND bootstrap CI excludes zero AND not high variance
  primary_counts:
    material_harmful: 11
    neutral_or_uncertain: 827
    material_helpful: 162
  strict_confidence_counts:
    material_harmful: 4
    neutral_or_uncertain: 877
    material_helpful: 119

